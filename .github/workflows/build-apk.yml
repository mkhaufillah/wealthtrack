name: Build Flutter APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create platform directories
        run: flutter create --project-name wealthtrack --org com.filla --platforms android .

      - name: Setup release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: python3 ../scripts/ci_release_setup.py

      - name: Fix app display name (wealthtrack → WealthTrack)
        run: |
          sed -i 's/android:label="wealthtrack"/android:label="WealthTrack"/g' android/app/src/main/AndroidManifest.xml

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-pillow
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Generate app icons
        run: |
          pip install Pillow
          python3 generate_icons.py --platforms android

      - name: Install dependencies
        run: flutter pub get

      - name: Remove default test file
        run: rm -f test/widget_test.dart

      - name: Run tests
        run: flutter test

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: wealthtrack-apk
          path: mobile/build/app/outputs/flutter-apk/*.apk
