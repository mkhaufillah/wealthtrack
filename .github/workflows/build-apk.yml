name: Build Flutter APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  packages: read

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create platform directories
        run: flutter create --project-name wealthtrack --org com.filla --platforms android .

      - name: Setup release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: python3 ../scripts/ci_release_setup.py

      - name: Fix app display name (wealthtrack → WealthTrack)
        run: |
          sed -i 's/android:label="wealthtrack"/android:label="WealthTrack"/g' android/app/src/main/AndroidManifest.xml

      - name: Patch AndroidManifest for network permissions
        run: python3 ../scripts/ci_patch_manifest.py

      - name: Ensure ProGuard rules for release build
        run: |
          cat > android/app/proguard-rules.pro << 'EOF'
          # Flutter/Dart HTTP client connectivity
          -keep class io.flutter.** { *; }
          -dontwarn io.flutter.**

          # OkHttp (used by Flutter on Android for network)
          -keep class okhttp3.** { *; }
          -keep interface okhttp3.** { *; }
          -dontwarn okhttp3.**
          -dontwarn okio.**

          # Keep all model/serialization classes
          -keep class com.filla.wealthtrack.** { *; }
          EOF

      - name: Verify AndroidManifest has INTERNET permission
        run: |
          grep -q "INTERNET" android/app/src/main/AndroidManifest.xml && echo "✅ INTERNET permission found" || echo "❌ INTERNET permission MISSING"
          echo "--- Manifest content ---"
          cat android/app/src/main/AndroidManifest.xml

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-pillow
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Generate app icons
        run: |
          pip install Pillow
          python3 generate_icons.py --platforms android

      - name: Install dependencies
        run: flutter pub get

      - name: Remove default test file
        run: rm -f test/widget_test.dart

      - name: Run tests
        run: flutter test

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Verify release APK
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(stat -c%s "$APK_PATH")
            echo "✅ APK found: $APK_PATH (${SIZE} bytes)"
            if [ "$SIZE" -gt 1048576 ]; then
              echo "✅ APK size > 1MB (${SIZE} bytes)"
            else
              echo "❌ APK size is only ${SIZE} bytes (expected > 1MB)"
              exit 1
            fi
          else
            echo "❌ APK not found at $APK_PATH"
            exit 1
          fi

      - name: Upload APK to GitHub Release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          TAG="ci-build-${GITHUB_SHA::7}"
          gh release create "$TAG" "$APK_PATH" \
            --title "CI Build ${GITHUB_SHA::7}" \
            --notes "Auto-built from commit ${GITHUB_SHA}" \
            --target "$GITHUB_SHA" \
            --latest=false \
            --prerelease || \
          gh release upload "$TAG" "$APK_PATH" --clobber || true

      - name: Telegram notification — success
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d message_thread_id="${TOPIC_ID}" \
            -d parse_mode="HTML" \
            -d text="<b>✅ WealthTrack APK</b>%0ABuild APK <code>${GITHUB_SHA::7}</code> berhasil 🚀%0ARun: <a href=\"https://github.com/mkhaufillah/wealthtrack/actions/runs/${GITHUB_RUN_ID}\">#${GITHUB_RUN_ID}</a>"

      - name: Telegram notification — failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d message_thread_id="${TOPIC_ID}" \
            -d parse_mode="HTML" \
            -d text="<b>❌ WealthTrack APK</b>%0ABuild APK <code>${GITHUB_SHA::7}</code> gagal!%0A<a href=\"https://github.com/mkhaufillah/wealthtrack/actions/runs/${GITHUB_RUN_ID}\">Lihat logs</a>"
