name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 2222
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "→ Pulling latest code..."
            cd /home/filla/dev/wealthtrack
            git pull origin main

            echo "→ Activating venv & installing deps..."
            source .venv/bin/activate
            /home/filla/.local/bin/uv pip install -q -r backend/requirements.txt

            echo "→ Running database migration..."
            /home/filla/.local/bin/uv run python -m backend.app.migrate_db

            echo "→ Restarting service..."
            sudo systemctl restart wealthtrack

            echo "✅ Deploy complete"
