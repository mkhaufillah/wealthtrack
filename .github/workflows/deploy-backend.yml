name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q -r requirements.txt
          pip install -q pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 2222
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "→ Pulling latest code..."
            cd /home/filla/dev/wealthtrack
            git pull origin main

            echo "→ Ensuring backend/.env exists..."
            if [ ! -f backend/.env ]; then
              python3 -c "import secrets; f=open('backend/.env','w'); f.write(f'SECRET_KEY={secrets.token_hex(32)}\nDEBUG=True\nACCESS_TOKEN_EXPIRE_DAYS=30\n')"
              echo "  ✅ Generated backend/.env with random SECRET_KEY"
            fi

            echo "→ Activating venv & installing deps..."
            source .venv/bin/activate
            /home/filla/.local/bin/uv pip install -q -r backend/requirements.txt

            echo "→ Running database migration..."
            /home/filla/.local/bin/uv run python -m backend.app.migrate_db

            echo "→ Restarting service..."
            sudo systemctl restart wealthtrack

            echo "✅ Deploy complete! Backend running on port 8080"
