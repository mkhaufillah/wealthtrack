name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WEALTHTRACK_TEST_DATABASE_URL: postgresql://wealthtrack_test:wealthtrack_test123@localhost:5433/wealthtrack_test
  TG_CHAT_ID: "-1003997003114"
  TG_TOPIC_ID: "3"

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: wealthtrack_test
          POSTGRES_PASSWORD: wealthtrack_test123
          POSTGRES_DB: wealthtrack_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: 🚀 Notify — CI started
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TG_CHAT_ID }}" \
            -d message_thread_id="${{ env.TG_TOPIC_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>🚀 WealthTrack CI</b>%0A<code>${GITHUB_SHA::7}</code> — tests running... ⏳"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q -r requirements.txt
          pip install -q pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          WEALTHTRACK_TEST_DATABASE_URL: ${{ env.WEALTHTRACK_TEST_DATABASE_URL }}

      - name: ❌ Notify — tests failed
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TG_CHAT_ID }}" \
            -d message_thread_id="${{ env.TG_TOPIC_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>❌ WealthTrack CI</b>%0ATests failed for <code>${GITHUB_SHA::7}</code>!%0A<a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">Lihat details</a>"

  deploy:
    needs: test
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Pull & update dependencies
        run: |
          set -e
          cd ~/dev/wealthtrack
          git pull origin main
          source .venv/bin/activate
          uv pip install -q -r backend/requirements.txt

      - name: Restart service (NOPASSWD sudo)
        run: sudo systemctl restart wealthtrack

      - name: Health check
        run: |
          echo "→ Waiting for service to be ready..."
          for i in $(seq 1 12); do
            if curl -sf http://127.0.0.1:8080/api/v1/health > /dev/null 2>&1; then
              echo "✅ Service is healthy"
              exit 0
            fi
            echo "  Attempt $i/12 — not ready yet, waiting 10s..."
            sleep 10
          done
          echo "❌ Service failed to respond after 12 attempts"
          exit 1

      - name: ✅ Notify — deploy success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TG_CHAT_ID }}" \
            -d message_thread_id="${{ env.TG_TOPIC_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>✅ WealthTrack Deploy</b>%0A<code>${GITHUB_SHA::7}</code> deployed successfully 🚀"

      - name: ❌ Notify — deploy failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TG_CHAT_ID }}" \
            -d message_thread_id="${{ env.TG_TOPIC_ID }}" \
            -d parse_mode="HTML" \
            -d text="<b>❌ WealthTrack Deploy</b>%0ADeploy gagal untuk <code>${GITHUB_SHA::7}</code>!%0A<a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">Lihat details</a>"
