name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'deploy/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WEALTHTRACK_TEST_DATABASE_URL: postgresql://wealthtrack_test:wealthtrack_test123@localhost:5433/wealthtrack_test

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: wealthtrack_test
          POSTGRES_PASSWORD: wealthtrack_test123
          POSTGRES_DB: wealthtrack_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q -r requirements.txt
          pip install -q pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          WEALTHTRACK_TEST_DATABASE_URL: ${{ env.WEALTHTRACK_TEST_DATABASE_URL }}

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 2222
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "→ Pulling latest code..."
            cd /home/filla/dev/wealthtrack
            git pull origin main

            echo "→ Ensuring backend/.env exists..."
            if [ ! -f backend/.env ]; then
              python3 -c "import secrets; f=open('backend/.env','w'); f.write(f'SECRET_KEY={secrets.token_hex(32)}\nDEBUG=True\nACCESS_TOKEN_EXPIRE_DAYS=30\nDATABASE_URL=postgresql://wealthtrack:wealthtrack123@localhost:5432/wealthtrack\n')"
              echo "  ✅ Generated backend/.env"
            fi

            echo "→ Activating venv & installing deps..."
            source .venv/bin/activate
            /home/filla/.local/bin/uv pip install -q -r backend/requirements.txt

            echo "→ Restarting service..."
            sudo systemctl restart wealthtrack

            echo "✅ Deploy complete! Backend running on port 8080"

      - name: Health check (via SSH)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 2222
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "→ Waiting for service to be ready..."
            for i in $(seq 1 12); do
              if curl -sf http://127.0.0.1:8080/api/v1/health > /dev/null 2>&1; then
                echo "✅ Service is healthy"
                exit 0
              fi
              echo "  Attempt $i/12 — not ready yet, waiting 10s..."
              sleep 10
            done
            echo "❌ Service failed to respond after 12 attempts"
            exit 1

      - name: Telegram notification — success
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d message_thread_id="${TOPIC_ID}" \
            -d parse_mode="HTML" \
            -d text="<b>✅ WealthTrack Deploy</b>%0ABackend deployed <code>${GITHUB_SHA::7}</code> 🚀"

      - name: Telegram notification — failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d message_thread_id="${TOPIC_ID}" \
            -d parse_mode="HTML" \
            -d text="<b>❌ WealthTrack Deploy</b>%0ADeploy gagal! <a href=\"https://github.com/mkhaufillah/wealthtrack/actions/runs/${GITHUB_RUN_ID}\">Lihat logs</a>"
