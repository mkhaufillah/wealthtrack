<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      .line { fill: none; stroke: #2ECC71; stroke-width: 32; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Bar chart (subtle) -->
  <rect x="100" y="300" width="60" height="140" rx="8" fill="#2ECC71" opacity="0.12"/>
  <rect x="190" y="220" width="60" height="220" rx="8" fill="#2ECC71" opacity="0.12"/>
  <rect x="280" y="140" width="60" height="300" rx="8" fill="#2ECC71" opacity="0.12"/>
  <rect x="370" y="80" width="60" height="360" rx="8" fill="#2ECC71" opacity="0.12"/>

  <!-- Trending up line with integrated arrowhead -->
  <path class="line" d="M 70 420 
           C 140 400, 120 260, 200 280 
           C 260 300, 240 180, 310 180 
           C 360 180, 350 100, 400 80"/>
  
  <!-- Arrowhead -->
  <polygon points="400,80 370,110 440,120" fill="#2ECC71" stroke="none"/>
</svg>
